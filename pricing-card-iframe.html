<head>
<meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    font-family: 'Poppins', sans-serif;
    padding: 40px 24px;
    display: flex;
    justify-content: center;
  }
  .card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 2px 16px rgba(61,79,68,0.09);
    padding: 32px 36px;
    max-width: 480px;
    width: 100%;
  }
  .card-title {
    font-weight: 700;
    font-size: 1.05rem;
    color: #2e3a2e;
    margin-bottom: 24px;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .item img {
    width: 32px;
    height: 32px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .item span {
    font-size: 0.97rem;
    color: #9b8560;
  }
  .divider {
    border: none;
    border-top: 1px solid #e8e2d9;
    margin: 24px 0;
  }
  .pricing {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .price-main {
    font-size: 1.7rem;
    font-weight: 700;
    color: #2e3a2e;
  }
  .price-main span {
    font-size: 1rem;
    font-weight: 400;
    color: #2e3a2e;
  }
  .price-old {
    font-size: 0.9rem;
    color: #b0a898;
    text-decoration: line-through;
  }
  .price-save {
    background: #f5e8e4;
    color: #c0714a;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 50px;
  }
</style>
